<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Quiz - Trắc nghiệm tương tác</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; color: white; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .setup-input { background: #334155; border: 1px solid #475569; border-radius: 8px; padding: 10px; color: white; width: 100%; }
        .setup-input:focus { outline: 2px solid #3b82f6; }
    </style>
</head>
<body>

    <!-- Màn hình thiết lập câu hỏi -->
    <div id="setup-screen" class="fixed inset-0 bg-slate-900 z-50 p-8 flex flex-col items-center overflow-y-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">Thiết Lập Câu Hỏi Trắc Nghiệm</h1>
        
        <div id="questions-container" class="w-full max-w-2xl space-y-6">
            <!-- Câu hỏi mẫu -->
            <div class="q-item bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                <label class="block mb-2 font-semibold">Câu hỏi:</label>
                <input type="text" placeholder="Nhập câu hỏi..." class="q-text setup-input mb-4" value="Thủ đô của Việt Nam là gì?">
                
                <label class="block mb-2 font-semibold text-sm">Các đáp án:</label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex items-center space-x-2">
                        <span class="text-red-400 font-bold">A</span>
                        <input type="text" class="ans-a setup-input text-sm" value="Hà Nội">
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-blue-400 font-bold">B</span>
                        <input type="text" class="ans-b setup-input text-sm" value="TP.HCM">
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-yellow-400 font-bold">C</span>
                        <input type="text" class="ans-c setup-input text-sm" value="Đà Nẵng">
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-green-400 font-bold">D</span>
                        <input type="text" class="ans-d setup-input text-sm" value="Huế">
                    </div>
                </div>
                
                <label class="block mt-4 mb-2 font-semibold text-sm">Đáp án đúng:</label>
                <select class="correct-ans setup-input bg-green-900 border-green-700">
                    <option value="0">Đáp án A</option>
                    <option value="1">Đáp án B</option>
                    <option value="2">Đáp án C</option>
                    <option value="3">Đáp án D</option>
                </select>
            </div>
        </div>

        <div class="mt-8 space-x-4 flex sticky bottom-0 bg-slate-900 py-4 w-full justify-center">
            <button onclick="addQuestion()" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-full font-bold transition border border-slate-500"> + Thêm câu hỏi </button>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-500 px-10 py-2 rounded-full font-bold transition shadow-lg animate-pulse"> BẮT ĐẦU CHƠI </button>
        </div>
    </div>

    <!-- Màn hình hiển thị Game -->
    <div id="game-container" class="hidden relative flex flex-col items-center justify-center min-h-screen">
        <div id="canvas-parent" class="relative">
            <!-- Canvas sẽ được chèn vào đây -->
        </div>
        
        <div class="mt-4 text-center max-w-2xl px-4">
            <p id="game-status" class="text-xl font-semibold text-yellow-400 h-8">Đang khởi tạo...</p>
            <div class="flex justify-between items-center mt-2 w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <p id="question-count" class="text-slate-400">Câu 1 / 1</p>
                <p id="score-display" class="text-2xl font-bold text-green-400">Điểm: 0</p>
            </div>
        </div>

        <button onclick="location.reload()" class="absolute top-4 right-4 bg-red-600/50 hover:bg-red-600 p-2 rounded-lg text-xs transition">Thoát cài đặt</button>
    </div>

    <script>
        let video;
        let poseNet;
        let poses = [];
        let gameState = "SETUP"; 
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isModelReady = false;
        
        // Vùng chọn (A: Trên Trái, B: Trên Phải, C: Dưới Trái, D: Dưới Phải)
        let zones = [
            { id: 0, label: 'A', x: 20, y: 20, w: 180, h: 100, color: [239, 68, 68], progress: 0 },
            { id: 1, label: 'B', x: 440, y: 20, w: 180, h: 100, color: [59, 130, 246], progress: 0 },
            { id: 2, label: 'C', x: 20, y: 360, w: 180, h: 100, color: [245, 158, 11], progress: 0 },
            { id: 3, label: 'D', x: 440, y: 360, w: 180, h: 100, color: [16, 185, 129], progress: 0 }
        ];

        const SELECTION_TIME = 45; // Khoảng 1.5 giây

        function addQuestion() {
            const container = document.getElementById('questions-container');
            const div = document.createElement('div');
            div.className = "q-item bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl";
            div.innerHTML = `
                <label class="block mb-2 font-semibold">Câu hỏi:</label>
                <input type="text" placeholder="Nhập câu hỏi..." class="q-text setup-input mb-4">
                <label class="block mb-2 font-semibold text-sm">Các đáp án:</label>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" placeholder="A" class="ans-a setup-input text-sm">
                    <input type="text" placeholder="B" class="ans-b setup-input text-sm">
                    <input type="text" placeholder="C" class="ans-c setup-input text-sm">
                    <input type="text" placeholder="D" class="ans-d setup-input text-sm">
                </div>
                <label class="block mt-4 mb-2 font-semibold text-sm">Đáp án đúng:</label>
                <select class="correct-ans setup-input bg-green-900 border-green-700">
                    <option value="0">Đáp án A</option>
                    <option value="1">Đáp án B</option>
                    <option value="2">Đáp án C</option>
                    <option value="3">Đáp án D</option>
                </select>
                <button onclick="this.parentElement.remove()" class="text-red-400 text-xs mt-4 hover:underline">Xóa câu hỏi này</button>
            `;
            container.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function startGame() {
            const items = document.querySelectorAll('.q-item');
            quizData = Array.from(items).map(item => ({
                question: item.querySelector('.q-text').value || "Câu hỏi không tên",
                options: [
                    item.querySelector('.ans-a').value || "A",
                    item.querySelector('.ans-b').value || "B",
                    item.querySelector('.ans-c').value || "C",
                    item.querySelector('.ans-d').value || "D"
                ],
                correct: parseInt(item.querySelector('.correct-ans').value)
            }));

            if(quizData.length === 0) return alert("Vui lòng thêm ít nhất 1 câu hỏi!");

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            
            // Khởi tạo p5 theo cách thủ công để đảm bảo nó render vào đúng thời điểm
            if (!window.p5Instance) {
                window.p5Instance = new p5(gameSketch);
            }
            gameState = "PLAYING";
        }

        // Sketch chính của game
        const gameSketch = (p) => {
            p.setup = () => {
                let canvas = p.createCanvas(640, 480);
                canvas.parent('canvas-parent');
                
                video = p.createCapture(p.VIDEO);
                video.size(640, 480);
                video.hide();

                poseNet = ml5.poseNet(video, () => {
                    isModelReady = true;
                    document.getElementById('game-status').innerText = "Giơ tay vào ô đáp án để chọn!";
                });

                poseNet.on('pose', results => {
                    poses = results;
                });
            };

            p.draw = () => {
                if (gameState === "SETUP") return;

                // 1. Vẽ Camera Mirror
                p.push();
                p.translate(p.width, 0);
                p.scale(-1, 1);
                p.image(video, 0, 0, p.width, p.height);
                p.pop();

                // Overlay tối để dễ đọc chữ
                p.fill(0, 0, 0, 100);
                p.rect(0, 0, p.width, p.height);

                if (gameState === "PLAYING") {
                    updateQuestionDisplay();
                    let currentQ = quizData[currentQuestionIndex];
                    
                    // 2. Vẽ câu hỏi
                    p.textAlign(p.CENTER, p.CENTER);
                    p.fill(255);
                    p.textSize(26);
                    p.textStyle(p.BOLD);
                    p.text(currentQ.question, 40, p.height/2 - 60, p.width - 80, 100);

                    // 3. Xử lý logic tay
                    checkWrists(p);

                    // 4. Vẽ các ô đáp án
                    drawGameZones(p, currentQ);
                } else if (gameState === "PAUSED") {
                    // Trạng thái chờ qua câu mới - vẽ kết quả vừa chọn
                    p.fill(255, 200);
                    p.textSize(32);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text("Kiểm tra kết quả...", p.width/2, p.height/2);
                } else if (gameState === "FINISHED") {
                    showFinalResult(p);
                }
            };
        };

        function updateQuestionDisplay() {
            document.getElementById('question-count').innerText = `Câu ${currentQuestionIndex + 1} / ${quizData.length}`;
        }

        function drawGameZones(p, q) {
            zones.forEach((z, i) => {
                let isHovered = z.progress > 0;
                
                // Vẽ khung nền
                p.fill(z.color[0], z.color[1], z.color[2], isHovered ? 200 : 120);
                p.noStroke();
                p.rect(z.x, z.y, z.w, z.h, 15);

                // Vẽ chữ A, B, C, D
                p.fill(255);
                p.textSize(36);
                p.textAlign(p.CENTER, p.TOP);
                p.text(z.label, z.x + z.w/2, z.y + 10);

                // Vẽ nội dung đáp án
                p.textSize(16);
                p.textAlign(p.CENTER, p.CENTER);
                p.text(q.options[i], z.x + 10, z.y + 40, z.w - 20, 60);

                // Thanh tiến trình (Loading bar)
                if (z.progress > 0) {
                    p.fill(255, 255, 255, 150);
                    p.rect(z.x + 10, z.y + z.h - 15, z.w - 20, 8, 4);
                    p.fill(255);
                    let progressW = p.map(z.progress, 0, SELECTION_TIME, 0, z.w - 20);
                    p.rect(z.x + 10, z.y + z.h - 15, progressW, 8, 4);
                }
            });
        }

        function checkWrists(p) {
            if (!isModelReady || poses.length === 0) return;

            let pose = poses[0].pose;
            let joints = [];
            
            // Theo dõi cổ tay trái và phải
            if (pose.leftWrist.confidence > 0.3) joints.push({ x: p.width - pose.leftWrist.x, y: pose.leftWrist.y });
            if (pose.rightWrist.confidence > 0.3) joints.push({ x: p.width - pose.rightWrist.x, y: pose.rightWrist.y });

            // Vẽ điểm định vị tay
            p.fill(0, 255, 255);
            p.noStroke();
            joints.forEach(j => {
                p.ellipse(j.x, j.y, 20);
                p.noFill();
                p.stroke(0, 255, 255);
                p.ellipse(j.x, j.y, 30 + p.sin(p.frameCount * 0.1) * 10);
            });

            // Kiểm tra va chạm
            zones.forEach(z => {
                let isInside = joints.some(j => (j.x > z.x && j.x < z.x + z.w && j.y > z.y && j.y < z.y + z.h));
                if (isInside) {
                    z.progress++;
                    if (z.progress >= SELECTION_TIME) {
                        validateAnswer(z.id);
                        resetAllProgress();
                    }
                } else {
                    z.progress = p.max(0, z.progress - 1.5);
                }
            });
        }

        function validateAnswer(selectedIdx) {
            if (gameState !== "PLAYING") return;
            
            gameState = "PAUSED";
            let correct = quizData[currentQuestionIndex].correct;
            let statusEl = document.getElementById('game-status');

            if (selectedIdx === correct) {
                score += 10;
                statusEl.innerText = "CHÍNH XÁC! 🎉";
                statusEl.className = "text-xl font-bold text-green-400 scale-110 transition-all";
            } else {
                statusEl.innerText = `SAI RỒI! Đáp án là ${zones[correct].label} ❌`;
                statusEl.className = "text-xl font-bold text-red-400";
            }

            document.getElementById('score-display').innerText = "Điểm: " + score;

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex >= quizData.length) {
                    gameState = "FINISHED";
                } else {
                    gameState = "PLAYING";
                    statusEl.innerText = "Giơ tay vào ô đáp án để chọn!";
                    statusEl.className = "text-xl font-semibold text-yellow-400";
                }
            }, 2500);
        }

        function resetAllProgress() {
            zones.forEach(z => z.progress = 0);
        }

        function showFinalResult(p) {
            p.background(15, 23, 42);
            p.textAlign(p.CENTER, p.CENTER);
            p.fill(255);
            p.textSize(40);
            p.text("KẾT THÚC!", p.width/2, p.height/2 - 50);
            p.textSize(24);
            p.text(`Bạn đạt được: ${score} điểm`, p.width/2, p.height/2 + 10);
            p.textSize(16);
            p.fill(148, 163, 184);
            p.text("Nhấn nút 'Thoát' ở góc màn hình để bắt đầu lại", p.width/2, p.height/2 + 60);
        }
    </script>
</body>
</html>
